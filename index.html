<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="SmartVenue PromptWars — AI-powered crowd intelligence for large-scale exhibition halls and tech expos. Real-time booth routing, queue predictions, and emergency guidance." />
  <meta name="theme-color" content="#06080f" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com; script-src 'self' 'unsafe-inline' https://*.googleapis.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.googleapis.com https://*.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com https://generativelanguage.googleapis.com;">
  <title>SmartVenue — PromptWars Exhibition Intelligence</title>

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/favicon.ico" />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles/main.css?v=2" />

  <!-- Google Maps API (CDN) — Replace YOUR_API_KEY or remove for simulation mode -->
  <script src="https://maps.googleapis.com/maps/api/js?key=%VITE_GOOGLE_MAPS_API_KEY%&libraries=visualization&loading=async" defer></script>

  <!-- Firebase SDKs (CDN) -->
  <!-- Firebase handled via NPM and Vite -->
  <!-- Vite handles env config securely -->
</head>

<body>
  <!-- Skip Link for Accessibility -->
  <a href="#map-container" class="skip-link" id="skip-link"
    style="position:absolute;top:-40px;left:0;padding:8px 16px;background:var(--accent-blue);color:#fff;z-index:9999;font-size:14px;border-radius:0 0 8px 0;transition:top 0.2s;"
    onfocus="this.style.top='0'" onblur="this.style.top='-40px'">
    Skip to Map
  </a>

  <div class="app-layout">
    <!-- Top Toolbar -->
    <header class="toolbar" id="toolbar" role="banner" aria-label="Application toolbar">
      <!-- Rendered by panelRenderer.ts -->
    </header>

    <!-- Emergency Banner -->
    <div class="emergency-banner" id="emergency-banner" role="alert" aria-live="assertive" style="display: none;">
      <!-- Rendered dynamically -->
    </div>

    <!-- Left Panel: Assistant Recommendations -->
    <aside class="side-panel left-panel" id="left-panel" role="complementary" aria-label="Assistant recommendations">
      <div class="panel-empty">
        <div class="loader"></div>
        <p>Initializing assistant…</p>
      </div>
    </aside>

    <!-- Center: Venue Map -->
    <main class="map-container" id="map-container" role="main" aria-label="Venue density map">
      <!-- Google Maps or Canvas fallback rendered here -->
    </main>

    <!-- Right Panel: Queue Intelligence -->
    <aside class="side-panel right-panel" id="right-panel" role="complementary" aria-label="Queue intelligence">
      <div class="panel-empty">
        <div class="loader"></div>
        <p>Loading queue data…</p>
      </div>
    </aside>
  </div>

  <!-- Accessibility Announcement Region -->
  <div id="aria-announcer" aria-live="polite" aria-atomic="true" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;"></div>

  <!-- Main Application Script (ES Module via Vite) -->
  <script type="module" src="./src/main.ts"></script>
</body>

</html>
